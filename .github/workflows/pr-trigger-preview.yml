name: Trigger preview for PR

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  build-preview:
    runs-on: ubuntu-latest

    steps:
      - name: Collect PR metadata
        env:
          PR_NUM: ${{ github.event.pull_request.number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          printf '%s\n' "$PR_NUM" > pr_num.txt
          printf '%s\n' "$PR_URL" > pr_url.txt
          printf '%s\n' "$PR_HEAD_REF" > pr_head_ref.txt
          printf '%s\n' "$PR_HEAD_SHA" > pr_head_sha.txt

      - name: Debug PR metadata
        run: |
          set -euo pipefail

          echo "=== PR metadata from files (if present) ==="
          for file in \
            pr_num.txt \
            pr_url.txt \
            pr_head_ref.txt \
            pr_head_sha.txt
          do
            if [ -f "$file" ]; then
              printf "%-18s: %s\n" "$file" "$(cat "$file")"
            else
              printf "%-18s: (missing)\n" "$file"
            fi
          done

      - name: Upload PR metadata
        uses: actions/upload-artifact@v4
        with:
          name: pr-metadata
          path: |
            pr_num.txt
            pr_url.txt
            pr_head_ref.txt
            pr_head_sha.txt
