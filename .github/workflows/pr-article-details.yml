name: Check article details

on:
  pull_request:
    branches:
      - main
    paths:
      - 'content/blog/**'
      - 'content/workshops/**'

jobs:
  check-article-details:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR contents
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install Hugo
        run: bash tools/ci/install-hugo.sh

      - name: Run shared article checks
        run: |
          bash tools/ci/check_article_details.sh
