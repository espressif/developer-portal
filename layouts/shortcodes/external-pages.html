{{- $columns := .Get "columns" | default 2 -}}
{{- if eq (printf "%v" $columns) "1" -}}
  <section class="not-prose grid grid-cols-1 gap-6 mb-10 items-stretch">
    {{- .Inner -}}
  </section>
{{- else if eq (printf "%v" $columns) "3" -}}
  <section class="not-prose grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6 mb-10 items-stretch">
    {{- .Inner -}}
  </section>
{{- else -}}
  <section class="not-prose grid grid-cols-1 sm:grid-cols-2 gap-6 mb-10 items-stretch">
    {{- .Inner -}}
  </section>
{{- end -}}
